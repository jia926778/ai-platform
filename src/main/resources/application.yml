server:
  port: 8080

spring:
  application:
    name: ai-platform
  datasource:
    url: jdbc:mysql://localhost:3306/ai_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: gpt-3.5-turbo
          temperature: 0.7
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}
    username: ${ES_USERNAME:}
    password: ${ES_PASSWORD:}
    connection-timeout: 5s
    socket-timeout: 30s
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

app:
  jwt:
    secret: ${JWT_SECRET:myVeryLongAndSecureSecretKeyForJWTTokenGeneration2024!}
    expiration: 86400000
    refresh-expiration: 604800000
  rate-limit:
    default-limit: 100
    default-duration: 3600
  # 多AI提供商配置
  ai:
    default-provider: OPENAI
    claude:
      enabled: ${CLAUDE_ENABLED:false}
      api-key: ${CLAUDE_API_KEY:}
      base-url: ${CLAUDE_BASE_URL:https://api.anthropic.com}
    qianwen:
      enabled: ${QIANWEN_ENABLED:false}
      api-key: ${QIANWEN_API_KEY:}
      base-url: ${QIANWEN_BASE_URL:https://dashscope.aliyuncs.com}

# Spring Retry 配置
spring.retry:
  enabled: true
